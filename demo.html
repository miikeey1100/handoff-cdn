<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handoff-CDN — Live Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0b0c;
    --panel:   #111315;
    --panel-2: #16191c;
    --line:    #23282d;
    --ink-0:   #e9ecee;
    --ink-2:   #9aa1a8;
    --ink-5:   #2e3338;
    --live:    #00b872;
    --violet:  oklch(0.72 0.28 305);
    --mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--ink-0);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .shell {
    width: 100%;
    max-width: 860px;
  }

  .window {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--line);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red    { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green  { background: #28c840; }
  .titlebar-label {
    margin-left: 8px;
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.08em;
  }

  .terminal {
    padding: 24px;
    font-size: 13px;
    line-height: 1.7;
    min-height: 420px;
  }

  .line { display: flex; align-items: flex-start; gap: 8px; opacity: 0; }
  .line.visible { opacity: 1; }

  .prompt { color: var(--live); flex-shrink: 0; }
  .cmd    { color: var(--ink-0); }
  .dim    { color: var(--ink-2); }
  .accent { color: var(--violet); }
  .live   { color: var(--live); }
  .gold   { color: oklch(0.82 0.14 75); }
  .gap    { height: 8px; }

  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--live);
    vertical-align: middle;
    animation: blink 1s step-end infinite;
    opacity: 0;
  }
  .cursor.visible { opacity: 1; }

  @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0; } }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: oklch(0.72 0.28 305 / 0.15);
    border: 1px solid oklch(0.72 0.28 305 / 0.4);
    border-radius: 4px;
    padding: 2px 10px;
    font-size: 11px;
    color: var(--violet);
    margin-left: 8px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 28px;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink-0);
  }
  .header p {
    margin-top: 8px;
    font-size: 13px;
    color: var(--ink-2);
    font-family: var(--mono);
  }

  .replay {
    display: block;
    margin: 24px auto 0;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--ink-2);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .replay:hover { border-color: var(--live); color: var(--live); }

  a { color: var(--live); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--ink-5);
  }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <h1>⬡ Handoff-CDN</h1>
    <p>The Design-to-Code Protocol for Claude — live demo</p>
  </div>

  <div class="window">
    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="titlebar-label">bash — handoff-cdn demo</span>
    </div>
    <div class="terminal" id="terminal"></div>
  </div>

  <button class="replay" onclick="replay()">↺ Replay demo</button>

  <div class="footer">
    <a href="https://github.com/miikeey1100/handoff-cdn">github.com/miikeey1100/handoff-cdn</a>
    &nbsp;·&nbsp; MIT licensed
  </div>
</div>

<script>
const FRAMES = [
  { delay: 400,  html: `<div class="line" id="l0"><span class="prompt">$</span><span class="cmd"> npx handoff-cdn list</span></div>` },
  { delay: 900,  html: `<div class="gap"></div>` },
  { delay: 1000, html: `<div class="line"><span class="dim">Handoff-CDN Registry — 8 bundles</span></div>` },
  { delay: 1100, html: `<div class="gap"></div>` },
  { delay: 1150, html: `<div class="line"><span class="accent">  aerodrop      </span><span class="live"> 99%</span><span class="dim"> [Liquid Glass]  AeroDrop — Autonomous AI Delivery</span></div>` },
  { delay: 1220, html: `<div class="line"><span class="accent">  agentic-ops   </span><span class="gold"> 97%</span><span class="dim"> [Monochrome]    Agentic Ops — Swarm Console</span></div>` },
  { delay: 1290, html: `<div class="line"><span class="accent">  luxar-vault   </span><span class="live"> 98%</span><span class="dim"> [Liquid Glass]  Luxar Vault — AI Crypto Wallet</span></div>` },
  { delay: 1360, html: `<div class="line"><span class="accent">  visionsynth   </span><span class="live"> 97%</span><span class="dim"> [Liquid Glass]  VisionSynth — AI Video Generator</span></div>` },
  { delay: 1500, html: `<div class="gap"></div>` },
  { delay: 1600, html: `<div class="line"><span class="prompt">$</span><span class="cmd"> npx handoff-cdn use aerodrop | claude</span></div>` },
  { delay: 2200, html: `<div class="gap"></div>` },
  { delay: 2300, html: `<div class="line"><span class="dim">  Fetching bundle from CDN...</span></div>` },
  { delay: 2700, html: `<div class="line"><span class="dim">  ✓ AeroDrop.html          <span class="live">27 KB</span></span></div>` },
  { delay: 2900, html: `<div class="line"><span class="dim">  ✓ tokens.css             <span class="live">4 KB</span></span></div>` },
  { delay: 3100, html: `<div class="line"><span class="dim">  ✓ chat1.md (intent)      <span class="live">3 KB</span></span></div>` },
  { delay: 3300, html: `<div class="gap"></div>` },
  { delay: 3400, html: `<div class="line"><span class="dim">══════════════════════════════════════════════════</span></div>` },
  { delay: 3500, html: `<div class="line"><span class="dim">  Handoff-CDN Protocol · aerodrop · v1.0</span></div>` },
  { delay: 3550, html: `<div class="line"><span class="dim">  AeroDrop — Autonomous AI Delivery</span></div>` },
  { delay: 3600, html: `<div class="line"><span class="dim">  Family: </span><span class="accent">Liquid Glass</span><span class="dim">  ·  Fidelity: </span><span class="live">99%</span><span class="dim">  ·  CDN: GitHub Raw</span></div>` },
  { delay: 3700, html: `<div class="line"><span class="dim">══════════════════════════════════════════════════</span></div>` },
  { delay: 3900, html: `<div class="gap"></div>` },
  { delay: 4000, html: `<div class="line"><span class="accent">Claude Code →</span><span class="dim"> implementing AeroDrop at </span><span class="live">99% fidelity</span><span class="badge">Liquid Glass</span></div>` },
  { delay: 4500, html: `<div class="gap"></div>` },
  { delay: 4600, html: `<div class="line"><span class="live">  ✓</span><span class="dim"> 3D isometric pathfinding map</span></div>` },
  { delay: 4750, html: `<div class="line"><span class="live">  ✓</span><span class="dim"> AI agent status card + pulse effects</span></div>` },
  { delay: 4900, html: `<div class="line"><span class="live">  ✓</span><span class="dim"> Glass sliders (Priority + Stealth Mode)</span></div>` },
  { delay: 5050, html: `<div class="line"><span class="live">  ✓</span><span class="dim"> tokens.css — oklch design tokens preserved</span></div>` },
  { delay: 5300, html: `<div class="gap"></div>` },
  { delay: 5400, html: `<div class="line"><span class="prompt">$</span><span class="cursor visible" id="cur"></span></div>` },
];

let timers = [];

function replay() {
  timers.forEach(clearTimeout);
  timers = [];
  const t = document.getElementById('terminal');
  t.innerHTML = '';
  run();
}

function run() {
  FRAMES.forEach(({ delay, html }) => {
    const tid = setTimeout(() => {
      const t = document.getElementById('terminal');
      t.insertAdjacentHTML('beforeend', html);
      // make lines visible on next frame for transition
      const lines = t.querySelectorAll('.line:not(.visible)');
      requestAnimationFrame(() => lines.forEach(l => l.classList.add('visible')));
      t.scrollTop = t.scrollHeight;
    }, delay);
    timers.push(tid);
  });
}

run();
</script>
</body>
</html>
